services:
  postgres:
    image: postgres:16
    container_name: lms-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - lms-pg-data:/var/lib/postgresql/data
      # Auto-applied on FIRST container start only (when the data volume is empty).
      # To re-apply: `docker compose down -v` then `docker compose up -d`.
      - ./backend/src/main/resources/db/migration/V1__saas_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  lms-pg-data:
