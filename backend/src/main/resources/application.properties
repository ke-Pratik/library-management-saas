# Server Configuration
server.port=${PORT:8080}
spring.application.name=studycenter

# PostgreSQL Datasource
# Defaults point to local Docker Postgres (docker-compose.yml in repo root).
# In Render/production, set DB_URL / DB_USERNAME / DB_PASSWORD env vars to override.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate (schema managed by V1__saas_schema.sql - do NOT let Hibernate touch it)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Jackson
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=Asia/Kolkata
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT
jwt.secret=${JWT_SECRET:ChangeMeToA64CharRandomStringForLocalDevOnlyThisIsNotProductionSafeOk}
jwt.expiration-ms=${JWT_EXP_MS:86400000}

# CORS
frontend.url=${FRONTEND_URL:http://localhost:5173}

# Super-admin bootstrap (created on first startup if not present)
app.sysadmin.username=${SYSADMIN_USERNAME:pratik}
# BCrypt hash of "ChangeMe@123" - regenerate via BCrypt for production
app.sysadmin.password.bcrypt=${SYSADMIN_PASSWORD_BCRYPT:$2a$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy}

# Logging
logging.level.org.hibernate.SQL=INFO
logging.level.com.studycenter=INFO
